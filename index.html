<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veridia - Rise to Influencer</title>
<style>
body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0d0d0d; color:#fff; display:flex; justify-content:center; align-items:center; flex-direction:column; height:100vh; }
#gameContainer { width:800px; max-width:95%; text-align:center; }
button { padding:10px 20px; margin:10px; font-size:18px; cursor:pointer; border:none; border-radius:6px; background:#4caf50; color:#fff; transition:0.2s; }
button:hover { background:#45a049; }
#story { margin:20px 0; font-size:20px; min-height:80px; }
#stats { margin-top:10px; font-size:18px; }
canvas { border:2px solid #fff; margin-top:20px; display:none; }
#shop { margin-top:20px; }
</style>
</head>
<body>
<div id="gameContainer">
    <h1>VERIDIA</h1>
    <div id="story"></div>
    <div id="choices"></div>
    <div id="stats"></div>
    <div id="shop"></div>
    <canvas id="minigame" width="600" height="400"></canvas>
    <button id="startBtn">Start Game</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
<script>
// Player Data
let player = JSON.parse(localStorage.getItem('veridiaPlayer')) || {
    money: 0,
    fame: 0,
    followers: 0,
    level: 1
};

let currentChapter = 0;

// Chapters with branching choices
const chapters = [
    {
        story:"You wake up in a tiny apartment with $0. What do you do?",
        choices:[
            { text:"Deliver pizza (+$50)", action:()=> updateStats(50,0,0, nextChapter) },
            { text:"Make viral TikTok (50% fame)", action:()=> { let fameGain=Math.random()>0.5?50:0; updateStats(0,fameGain,0,nextChapter); } },
            { text:"Sleep in (nothing happens)", action:nextChapter }
        ]
    },
    {
        story:"Choose your hustle path:",
        choices:[
            { text:"Start YouTube channel (+50 fame)", action:()=> updateStats(0,50,0,nextChapter) },
            { text:"Do street hustles (+$100)", action:()=> updateStats(100,0,0,nextChapter) }
        ]
    },
    {
        story:"Mini-game time! Catch coins to get sponsorships!",
        choices:[
            { text:"Start Mini-game", action:startMiniGame }
        ]
    },
    {
        story:"Time to upgrade your influencer career. Choose wisely:",
        choices:[
            { text:"Buy Camera ($200) - +20 fame", action:()=> buyUpgrade("Camera",200,()=>player.fame+=20) },
            { text:"Hire Assistant ($500) - +50 money", action:()=> buyUpgrade("Assistant",500,()=>player.money+=50) }
        ]
    },
    {
        story:"Invest your money wisely:",
        choices:[
            { text:"Invest in Crypto (50% chance double money)", action:()=> { let gain=Math.random()>0.5?player.money:0; updateStats(gain,0,0,endGame); } },
            { text:"Invest in Stocks (+50 money guaranteed)", action:()=> updateStats(50,0,0,endGame) }
        ]
    }
];

// DOM elements
const storyEl = document.getElementById("story");
const choicesEl = document.getElementById("choices");
const statsEl = document.getElementById("stats");
const startBtn = document.getElementById("startBtn");
const canvas = document.getElementById("minigame");
const shopEl = document.getElementById("shop");

// Start Game
startBtn.addEventListener("click",()=>{
    startBtn.style.display="none";
    showChapter();
});

// Update Stats
function updateStats(moneyGain,fameGain,followersGain,callback){
    player.money+=moneyGain;
    player.fame+=fameGain;
    player.followers+=followersGain;
    localStorage.setItem('veridiaPlayer', JSON.stringify(player));
    showStats();
    callback();
}

// Show Stats
function showStats(){
    statsEl.textContent=`Money: $${player.money} | Fame: ${player.fame} | Followers: ${player.followers} | Level: ${player.level}`;
}

// Show Chapter
function showChapter(){
    if(currentChapter>=chapters.length){ endGame(); return; }
    const chap = chapters[currentChapter];
    storyEl.textContent=chap.story;
    choicesEl.innerHTML="";
    shopEl.innerHTML="";
    chap.choices.forEach(choice=>{
        const btn=document.createElement("button");
        btn.textContent=choice.text;
        btn.onclick=choice.action;
        choicesEl.appendChild(btn);
    });
}

// Next Chapter
function nextChapter(){
    currentChapter++;
    player.level++;
    showChapter();
}

// End Game
function endGame(){
    storyEl.textContent=`🎉 Congratulations! You finished Veridia! Money: $${player.money}, Fame: ${player.fame}, Followers: ${player.followers}, Level: ${player.level}`;
    choicesEl.innerHTML="";
    canvas.style.display="none";
}

// Buy Upgrade
function buyUpgrade(name,cost,effect){
    if(player.money>=cost){
        player.money-=cost;
        effect();
        localStorage.setItem('veridiaPlayer', JSON.stringify(player));
        showStats();
        nextChapter();
    }else{
        alert("Not enough money!");
    }
}

// Mini-game (Phaser)
let miniGameStarted=false;
function startMiniGame(){
    choicesEl.innerHTML="";
    canvas.style.display="block";
    if(miniGameStarted) return;
    miniGameStarted=true;

    const config={
        type:Phaser.CANVAS,
        width:600,
        height:400,
        parent:canvas,
        physics:{ default:'arcade', arcade:{ gravity:{y:0} } },
        scene:{ preload, create, update }
    };
    const game=new Phaser.Game(config);

    let playerSprite,coins,score=0,scoreText,cursors;

    function preload(){
        this.load.image("player","https://i.imgur.com/O4DkZ0K.png");
        this.load.image("coin","https://i.imgur.com/8s6f7dB.png");
    }

    function create(){
        playerSprite=this.physics.add.sprite(300,350,"player");
        playerSprite.setCollideWorldBounds(true);
        coins=this.physics.add.group({ key:"coin", repeat:9, setXY:{x:50,y:0,stepX:60} });
        coins.children.iterate(c=>{
            c.setBounceY(Phaser.Math.FloatBetween(0.4,0.8));
            c.setCollideWorldBounds(true);
            c.setVelocity(0,Phaser.Math.Between(50,100));
        });
        scoreText=this.add.text(10,10,"Coins: 0",{fontSize:'20px',fill:'#fff'});
        this.physics.add.overlap(playerSprite,coins,collectCoin,null,this);
        cursors=this.input.keyboard.createCursorKeys();
    }

    function update(){
        if(!cursors) return;
        playerSprite.setVelocityX(0);
        if(cursors.left.isDown) playerSprite.setVelocityX(-200);
        if(cursors.right.isDown) playerSprite.setVelocityX(200);
    }

    function collectCoin(playerObj,coin){
        coin.disableBody(true,true);
        score++;
        scoreText.setText("Coins: "+score);
        if(score>=5){
            updateStats(100,50,10,nextChapter);
            game.destroy(true);
            canvas.style.display="none";
        }
    }
}

// Offline caching service worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW failed',e));
}

showStats();
</script>
</body>
</html>
